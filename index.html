<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMV Antiviral Resistance Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1623;
    --surface: #1a2235;
    --surface2: #222d42;
    --border: #2e3f5c;
    --accent: #00c2a8;
    --accent2: #3d8bff;
    --danger: #ff4f6d;
    --text: #e8edf5;
    --muted: #7a8ba8;
    --gold: #f5c842;
    --ul97: #3d8bff;
    --ul54: #b06cff;
    --ul56: #00c2a8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 10px;
  }

  .subtitle-heading {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 14px;
    max-width: 500px;
    line-height: 1.6;
  }

  /* ── PUZZLE ARENA ── */
  .arena {
    position: relative;
    width: 100%;
    max-width: 680px;
  }

  /* ── BALL CANVAS ── */
  #ballCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  /* ── TABLE ── */
  .puzzle-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface2);
  }

  th {
    padding: 14px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-align: center;
    border-bottom: 2px solid var(--border);
  }

  th:first-child { text-align: left; padding-left: 20px; color: var(--muted); }
  th.col-ul97 { color: var(--text); }
  th.col-ul54 { color: var(--text); }
  th.col-ul56 { color: var(--text); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td {
    padding: 12px 10px;
    text-align: center;
    vertical-align: middle;
  }

  td.drug-name {
    text-align: left;
    padding-left: 20px;
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }

  td.drug-name abbr {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    font-weight: 400;
    text-decoration: none;
  }

  /* ── BLOCKER CELLS ── */
  .cell-btn {
    width: 52px;
    height: 42px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 700;
    transition: all 0.15s;
    color: transparent;
    position: relative;
  }

  .cell-btn:hover {
    border-color: var(--muted);
    background: rgba(255,255,255,0.04);
  }

  .cell-btn.blocked {
    background: rgba(255, 79, 109, 0.12);
    border-color: var(--danger);
    color: var(--danger);
  }

  /* feedback overlays */
  .cell-btn.wrong {
    background: rgba(255, 79, 109, 0.2) !important;
    border-color: var(--danger) !important;
    color: var(--danger) !important;
  }

  /* ── BUTTONS ── */
  .controls {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f1623;
    border: none;
    padding: 13px 32px;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 13px 24px;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  /* ── STATUS BAR ── */
  #status {
    min-height: 40px;
    text-align: center;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.5;
    transition: color 0.3s;
  }
  #status.success { color: var(--accent); }
  #status.failure { color: var(--danger); }
  #status.partial { color: var(--gold); }



  /* ── CORRECT POPUP ── */
  #correctPopup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    background: var(--accent);
    color: #0f1623;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 42px;
    font-weight: 700;
    padding: 28px 56px;
    border-radius: 16px;
    opacity: 0;
    pointer-events: none;
    z-index: 2000;
    transition: opacity 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  #correctPopup.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  #correctPopup.incorrect {
    background: var(--danger);
    color: #fff;
    font-size: 32px;
  }

  /* ── CORRECT POPUP ── */
  /* ── BOOK ICON & MODAL ── */
  .book-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color 0.2s, transform 0.15s;
    margin-top: 20px;
  }
  .book-btn:hover { color: var(--accent); transform: translateY(-2px); }
  .book-btn svg { width: 52px; height: 52px; }

  #refModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 3000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #refModal.open { display: flex; }
  .modal-inner {
    background: #fff;
    border-radius: 10px;
    max-width: 920px;
    width: 100%;
    overflow: hidden;
    position: relative;
    max-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-inner img {
    width: 100%;
    display: block;
    max-height: 90vh;
    object-fit: contain;
  }
  .modal-close {
    position: absolute;
    top: 10px; right: 12px;
    background: rgba(0,0,0,0.55);
    border: none;
    color: #fff;
    font-size: 18px;
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: rgba(0,0,0,0.85); }

  /* ── CONFETTI ── */
  #confettiCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 1000;
  }
</style>
</head>
<body>

<div id="correctPopup">Correct!</div>

<canvas id="confettiCanvas"></canvas>

<header>
  <p class="subtitle-heading">Which mutation confers resistance?</p>
  <p class="subtitle">Click to block activity with an X, then press <strong>Test Answer</strong>.</p>
</header>

<div class="arena" id="arena">
  <canvas id="ballCanvas"></canvas>

  <div class="puzzle-wrap">
    <table id="puzzleTable">
      <thead>
        <tr>
          <th>Drug</th>
          <th class="col-ul97">UL97</th>
          <th class="col-ul54">UL54</th>
          <th class="col-ul56">UL56</th>
        </tr>
      </thead>
      <tbody id="puzzleBody"></tbody>
    </table>
  </div>



  <div class="controls">
    <button class="btn-secondary" id="resetBtn">Reset</button>
    <button class="btn-primary" id="testBtn">Test Answer</button>
  </div>

  <div id="status"></div>
</div>

<div style="display:flex;gap:24px;justify-content:center;align-items:flex-end;">
<button class="book-btn" id="bookBtn" aria-label="Open reference image">

<button class="book-btn" id="pdfBtn" aria-label="Open supplement PDF">
  <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="8" y="6" width="28" height="38" rx="3" fill="currentColor" opacity="0.18"/>
    <rect x="10" y="4" width="28" height="38" rx="3" stroke="currentColor" stroke-width="2.5" fill="none"/>
    <line x1="16" y1="13" x2="32" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="20" x2="32" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="27" x2="26" y2="27" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M10 42 Q10 46 14 46 L38 46 Q42 46 42 42 L42 10 Q42 6 38 6" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </svg>
</button>
</div>

<script>
// ── ANSWER KEY ──────────────────────────────────────────────
// Columns: [UL97, UL54, UL56]  true = should be blocked (X)
const DRUGS = [
  { name: 'Ganciclovir', abbr: 'GCV', answer: [true,  true,  false], colorOnly: '#192E52' },
  { name: 'Foscarnet',   abbr: 'FOS', answer: [false, true,  false], colorOnly: '#FAE266' },
  { name: 'Maribavir',   abbr: 'MBV', answer: [true,  false, false], colorOnly: '#00994F' },
  { name: 'Letermovir',  abbr: 'LET', answer: [false, false, true],  colorOnly: '#FF914D' },
  { name: 'Cidofovir',   abbr: 'CDV', answer: [false, true,  false], colorOnly: '#F62650' },
];
const COLS = ['UL97','UL54','UL56'];

// ── BUILD TABLE ──────────────────────────────────────────────
const tbody = document.getElementById('puzzleBody');
DRUGS.forEach((drug, ri) => {
  const tr = document.createElement('tr');
  const nameTd = document.createElement('td');
  nameTd.className = 'drug-name';
  if (drug.colorOnly) {
    nameTd.style.background = drug.colorOnly;
    nameTd.style.padding = '0';
    nameTd.innerHTML = '';
  } else {
    nameTd.innerHTML = `${drug.name} <abbr>(${drug.abbr})</abbr>`;
  }
  tr.appendChild(nameTd);
  COLS.forEach((col, ci) => {
    const td = document.createElement('td');
    const btn = document.createElement('button');
    btn.className = 'cell-btn';
    btn.dataset.row = ri;
    btn.dataset.col = ci;
    btn.setAttribute('aria-label', `${drug.name} – ${col}`);
    btn.textContent = '';
    btn.addEventListener('click', toggleCell);
    td.appendChild(btn);
    tr.appendChild(td);
  });
  tbody.appendChild(tr);
});

function toggleCell(e) {
  const btn = e.currentTarget;
  if (btn.classList.contains('blocked')) {
    btn.classList.remove('blocked');
    btn.textContent = '';
  } else {
    btn.classList.add('blocked');
    btn.textContent = '✕';
  }
  // Clear feedback state
  btn.classList.remove('correct','wrong','missed');
}

// ── GET CURRENT STATE ─────────────────────────────────────────
function getState() {
  const state = DRUGS.map(() => [false,false,false]);
  document.querySelectorAll('.cell-btn').forEach(btn => {
    state[btn.dataset.row][btn.dataset.col] = btn.classList.contains('blocked');
  });
  return state;
}

// ── BALL PHYSICS ──────────────────────────────────────────────
// Grid-aware simulation: ball moves cell-by-cell through the table.
// Rules:
//   1. Ball starts above each open (non-blocked) cell in row 0.
//   2. Each step: try to move DOWN. If blocked below, try LEFT then RIGHT.
//   3. If all three directions are blocked, the ball is stuck → failure.
//   4. If ball exits the bottom of the grid → success.

const ballCanvas = document.getElementById('ballCanvas');
const bCtx = ballCanvas.getContext('2d');
let animFrames = [];

function resizeBallCanvas() {
  const arena = document.getElementById('arena');
  ballCanvas.width = arena.offsetWidth;
  ballCanvas.height = arena.offsetHeight;
}

// Returns true if cell [row][col] has an X in it (blocked or wrong)
function isCellBlocked(row, col) {
  if (col < 0 || col >= COLS.length) return true; // wall
  if (row < 0 || row >= DRUGS.length) return false; // above/below grid = open
  const btn = document.querySelector(`.cell-btn[data-row="${row}"][data-col="${col}"]`);
  return btn && (btn.classList.contains('blocked') || btn.classList.contains('wrong'));
}

// Get pixel center of a cell button, relative to arena
function getCellCenter(row, col) {
  const arenaRect = document.getElementById('arena').getBoundingClientRect();
  const btn = document.querySelector(`.cell-btn[data-row="${row}"][data-col="${col}"]`);
  const r = btn.getBoundingClientRect();
  return {
    x: r.left - arenaRect.left + r.width / 2,
    y: r.top - arenaRect.top + r.height / 2
  };
}

// Get pixel center of a column header (for entry point above row 0)
function getColHeaderCenter(col) {
  const arenaRect = document.getElementById('arena').getBoundingClientRect();
  const th = document.querySelectorAll('thead th')[col + 1]; // +1 for Drug label col
  const r = th.getBoundingClientRect();
  return {
    x: r.left - arenaRect.left + r.width / 2,
    y: r.top - arenaRect.top - 6  // just above the header row
  };
}

// Build the path a ball travels given a starting column.
// Returns { path: [{x,y}], escaped: bool }
function computePath(startCol) {
  let row = -1; // above the grid
  let col = startCol;
  const visited = new Set();
  const path = [];

  // Entry point: above the grid in this column
  const entry = getColHeaderCenter(col);
  path.push({ x: entry.x, y: entry.y - 30 }); // start a bit higher
  path.push({ x: entry.x, y: entry.y });

  const MAX_STEPS = 60;
  let steps = 0;

  while (steps++ < MAX_STEPS) {
    const key = `${row},${col}`;
    if (visited.has(key)) break; // loop guard
    visited.add(key);

    // Try DOWN first
    const nextRow = row + 1;
    if (nextRow >= DRUGS.length) {
      // Exited the bottom of the grid — success!
      // Add a point below the table
      const lastCenter = row >= 0
        ? getCellCenter(row, col)
        : getColHeaderCenter(col);
      path.push({ x: lastCenter.x, y: ballCanvas.height + 30 });
      return { path, escaped: true };
    }

    if (!isCellBlocked(nextRow, col)) {
      // Move down
      row = nextRow;
      path.push(getCellCenter(row, col));
      continue;
    }

    // DOWN is blocked — try LEFT
    const leftCol = col - 1;
    if (leftCol >= 0 && !isCellBlocked(row, leftCol) && !isCellBlocked(row + 1, leftCol)) {
      col = leftCol;
      if (row >= 0) path.push(getCellCenter(row, col));
      continue;
    }

    // Try RIGHT
    const rightCol = col + 1;
    if (rightCol < COLS.length && !isCellBlocked(row, rightCol) && !isCellBlocked(row + 1, rightCol)) {
      col = rightCol;
      if (row >= 0) path.push(getCellCenter(row, col));
      continue;
    }

    // All blocked — ball is stuck here
    const stuckPos = row >= 0
      ? getCellCenter(row, col)
      : getColHeaderCenter(col);
    path.push(stuckPos);
    return { path, escaped: false };
  }

  return { path, escaped: false };
}

// Animate a ball smoothly along a computed path
function animateBall(path, color, onDone) {
  if (path.length < 2) { if (onDone) onDone(); return; }

  const RADIUS = 9;
  const SPEED = 3.5; // px per frame
  let segIndex = 0;
  let progress = 0; // 0..1 along current segment
  let trail = [];
  let af;

  function step() {
    if (segIndex >= path.length - 1) {
      // Done — fade out
      let alpha = 1;
      const fx = path[path.length - 1].x;
      const fy = path[path.length - 1].y;
      function fade() {
        // Don't clear the whole canvas here — let the multi-ball manager do it
        alpha -= 0.05;
        if (alpha > 0) {
          bCtx.save();
          bCtx.globalAlpha = alpha;
          bCtx.beginPath();
          bCtx.arc(fx, fy, RADIUS, 0, Math.PI * 2);
          bCtx.fillStyle = color;
          bCtx.shadowColor = color;
          bCtx.shadowBlur = 12;
          bCtx.fill();
          bCtx.restore();
          requestAnimationFrame(fade);
        } else {
          if (onDone) onDone();
        }
      }
      setTimeout(fade, 400);
      return;
    }

    const from = path[segIndex];
    const to = path[segIndex + 1];
    const dx = to.x - from.x;
    const dy = to.y - from.y;
    const segLen = Math.sqrt(dx * dx + dy * dy) || 1;
    progress += SPEED / segLen;

    if (progress >= 1) {
      progress = 0;
      segIndex++;
    }

    const t = Math.min(progress, 1);
    const cx = from.x + dx * t;
    const cy = from.y + dy * t;

    trail.push({ x: cx, y: cy });
    if (trail.length > 12) trail.shift();

    // Draw trail
    trail.forEach((p, i) => {
      const a = (i / trail.length) * 0.5;
      const hex = Math.floor(a * 255).toString(16).padStart(2, '0');
      bCtx.beginPath();
      bCtx.arc(p.x, p.y, RADIUS * (i / trail.length) * 0.6, 0, Math.PI * 2);
      bCtx.fillStyle = color + hex;
      bCtx.fill();
    });

    // Draw ball
    bCtx.beginPath();
    bCtx.arc(cx, cy, RADIUS, 0, Math.PI * 2);
    bCtx.fillStyle = color;
    bCtx.shadowColor = color;
    bCtx.shadowBlur = 14;
    bCtx.fill();
    bCtx.shadowBlur = 0;

    af = requestAnimationFrame(step);
    animFrames.push(af);
  }

  af = requestAnimationFrame(step);
  animFrames.push(af);
}

// Master render loop: clears canvas every frame so multiple balls composite correctly
let masterRaf = null;
function startMasterLoop() {
  if (masterRaf) return;
  function loop() {
    bCtx.clearRect(0, 0, ballCanvas.width, ballCanvas.height);
    masterRaf = requestAnimationFrame(loop);
  }
  masterRaf = requestAnimationFrame(loop);
}
function stopMasterLoop() {
  if (masterRaf) { cancelAnimationFrame(masterRaf); masterRaf = null; }
}

function clearAllBallAnimations() {
  animFrames.forEach(af => cancelAnimationFrame(af));
  animFrames = [];
  stopMasterLoop();
  bCtx.clearRect(0, 0, ballCanvas.width, ballCanvas.height);
}

// Launch one ball per open column in row 0, staggered
function runBallSimulation(isCorrect) {
  resizeBallCanvas();
  clearAllBallAnimations();
  startMasterLoop();

  const COLOR_PASS = '#00c2a8';
  const COLOR_FAIL = '#ff4f6d';

  // Find columns that are open in row 0
  const openCols = [];
  for (let ci = 0; ci < COLS.length; ci++) {
    if (!isCellBlocked(0, ci)) openCols.push(ci);
  }

  if (openCols.length === 0) {
    stopMasterLoop();
    return;
  }

  let completed = 0;
  openCols.forEach((col, i) => {
    setTimeout(() => {
      const { path, escaped } = computePath(col);
      const color = escaped ? COLOR_PASS : COLOR_FAIL;
      animateBall(path, color, () => {
        completed++;
        if (completed === openCols.length) {
          setTimeout(stopMasterLoop, 800);
          if (isCorrect) {
            setTimeout(() => {
              launchConfetti();
              showPopup('Correct!');
            }, 300);
          }
        }
      });
    }, i * 280);
  });
}

// ── CONFETTI ──────────────────────────────────────────────────
const confCanvas = document.getElementById('confettiCanvas');
const cCtx = confCanvas.getContext('2d');
let confettiPieces = [];

function launchConfetti() {
  confCanvas.width = window.innerWidth;
  confCanvas.height = window.innerHeight;
  confettiPieces = Array.from({length: 120}, () => ({
    x: Math.random() * confCanvas.width,
    y: Math.random() * -confCanvas.height,
    w: 8 + Math.random() * 8,
    h: 6 + Math.random() * 6,
    color: ['#00c2a8','#3d8bff','#f5c842','#b06cff','#ff4f6d'][Math.floor(Math.random()*5)],
    vy: 2 + Math.random() * 4,
    vx: (Math.random() - 0.5) * 3,
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 8,
    alpha: 1
  }));
  let tick = 0;
  function drawConf() {
    cCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    tick++;
    let alive = false;
    confettiPieces.forEach(p => {
      p.y += p.vy;
      p.x += p.vx;
      p.rot += p.rotV;
      if (tick > 80) p.alpha = Math.max(0, p.alpha - 0.012);
      if (p.alpha > 0) alive = true;
      cCtx.save();
      cCtx.globalAlpha = p.alpha;
      cCtx.translate(p.x, p.y);
      cCtx.rotate(p.rot * Math.PI / 180);
      cCtx.fillStyle = p.color;
      cCtx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      cCtx.restore();
    });
    if (alive) requestAnimationFrame(drawConf);
    else cCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
  }
  drawConf();
}

// ── CORRECT POPUP ─────────────────────────────────────────────
function showPopup(text, type = 'correct') {
  const popup = document.getElementById('correctPopup');
  popup.textContent = text;
  popup.classList.toggle('incorrect', type === 'incorrect');
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 1600);
}

// ── TEST ANSWER ───────────────────────────────────────────────
document.getElementById('testBtn').addEventListener('click', () => {
  const state = getState();
  let allCorrect = true;
  let errors = 0;

  // Reset feedback classes
  document.querySelectorAll('.cell-btn').forEach(btn => {
    btn.classList.remove('correct','wrong','missed');  });

  DRUGS.forEach((drug, ri) => {
    drug.answer.forEach((shouldBeBlocked, ci) => {
      const btn = document.querySelector(`.cell-btn[data-row="${ri}"][data-col="${ci}"]`);
      const isBlocked = state[ri][ci];
      if (!shouldBeBlocked && isBlocked) {
        btn.classList.add('wrong');
        errors++;
        allCorrect = false;
      } else if (shouldBeBlocked && !isBlocked) {
        errors++;
        allCorrect = false;
      }
    });
  });

  const statusEl = document.getElementById('status');

  if (allCorrect) {
    statusEl.className = '';
    statusEl.textContent = '';
    runBallSimulation(true);
  } else {
    statusEl.className = 'failure';
    runBallSimulation(false);
    setTimeout(() => showPopup('Incorrect, try again!', 'incorrect'), 1800);
  }
});

// ── RESET ─────────────────────────────────────────────────────
document.getElementById('resetBtn').addEventListener('click', () => {
  document.querySelectorAll('.cell-btn').forEach(btn => {
    btn.className = 'cell-btn';
    btn.textContent = '';
  });
  document.getElementById('status').className = '';
  document.getElementById('status').textContent = '';
  clearAllBallAnimations();
});

// ── BOOK / MODAL ──────────────────────────────────────────────
document.getElementById('bookBtn').addEventListener('click', () => {
  document.getElementById('refModal').classList.add('open');
});
document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('refModal').classList.remove('open');
});
document.getElementById('refModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('refModal')) {
    document.getElementById('refModal').classList.remove('open');
  }
});

// ── PDF SUPPLEMENT ────────────────────────────────────────────
document.getElementById('pdfBtn').addEventListener('click', () => {
  window.open('https://docs.google.com/document/d/1BbXaI9iBf9m2wYlsT-ltEg1wqD0huHQa7h1zcev7T5c/edit?usp=sharing', '_blank');
});

// ── RESIZE ───────────────────────────────────────────────────
window.addEventListener('resize', resizeBallCanvas);
resizeBallCanvas();
</script>
